<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6月 夕食カレンダー</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{
  --bg-primary:#ffffff;--bg-secondary:#f5f5f0;--bg-tertiary:#eeede8;
  --text-primary:#1a1a1a;--text-secondary:#6b6b6b;--text-tertiary:#9a9a9a;
  --border-light:rgba(0,0,0,0.12);--border-mid:rgba(0,0,0,0.25);
  --radius-md:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-primary:#1c1c1e;--bg-secondary:#2c2c2e;--bg-tertiary:#3a3a3c;
    --text-primary:#f2f2f7;--text-secondary:#aeaeb2;--text-tertiary:#6d6d72;
    --border-light:rgba(255,255,255,0.12);--border-mid:rgba(255,255,255,0.25);
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg-tertiary);min-height:100vh;padding:12px;}
.container{max-width:480px;margin:0 auto;}
.ttl{font-size:18px;font-weight:500;color:var(--text-primary);margin-bottom:10px;}
.leg{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.li{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-secondary);}
.ldot{width:8px;height:8px;border-radius:50%;background:#1D9E75;flex-shrink:0;}
.bq{display:inline-block;font-size:11px;padding:2px 6px;border-radius:8px;}
.bq.p{background:#FAEEDA;color:#633806;}.bq.q{background:#E1F5EE;color:#085041;}
.g7{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.dh{text-align:center;font-size:12px;color:var(--text-secondary);padding:4px 0;font-weight:500;}
.dh.su{color:#993C1D;}.dh.sa{color:#185FA5;}
.cell{background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:6px;padding:4px 3px;min-height:64px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.cell:active{background:var(--bg-secondary);}
.cell.emp{background:transparent;border-color:transparent;cursor:default;}
.cell.sh{background:#E1F5EE;}
.cell.sel{border:2px solid #1D9E75;}
.cell.csu .dn{color:#993C1D;}
.dn{font-size:11px;font-weight:500;color:var(--text-secondary);margin-bottom:2px;display:flex;align-items:center;gap:2px;line-height:1;}
.sp{width:5px;height:5px;border-radius:50%;background:#1D9E75;display:inline-block;flex-shrink:0;}
.mm{font-size:9px;font-weight:500;color:var(--text-primary);line-height:1.25;margin-bottom:1px;word-break:break-all;}
.bqs{display:block;font-size:8px;padding:1px 3px;border-radius:4px;margin-top:2px;width:fit-content;}
.bqs.p{background:#FAEEDA;color:#633806;}.bqs.q{background:#E1F5EE;color:#085041;}
.ms-off{font-size:9px;color:var(--text-tertiary);}
.panel{display:none;margin-top:10px;background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:12px;overflow:hidden;}
.panel.on{display:block;}
.panel-head{padding:14px 16px 12px;border-bottom:0.5px solid var(--border-light);}
.ptitle{font-size:17px;font-weight:500;color:var(--text-primary);}
.sun-msg{background:#FAEEDA;padding:12px 16px;font-size:14px;color:#633806;line-height:1.6;display:flex;align-items:flex-start;gap:8px;}
.sun-msg-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.dtabs{display:flex;border-bottom:0.5px solid var(--border-light);}
.dtab{flex:1;padding:12px 8px;font-size:14px;font-weight:500;text-align:center;cursor:pointer;color:var(--text-secondary);border-bottom:2px solid transparent;-webkit-tap-highlight-color:transparent;}
.dtab.on{color:#1D9E75;border-bottom:2px solid #1D9E75;}
.dsec{display:none;}.dsec.on{display:block;}
.psec{padding:14px 16px;}
.pl{font-size:12px;color:var(--text-secondary);font-weight:500;margin-bottom:4px;letter-spacing:0.2px;}
.main-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
.main-val{font-size:16px;font-weight:500;color:var(--text-primary);}
.recipe-link{font-size:13px;color:#185FA5;cursor:pointer;text-decoration:underline;white-space:nowrap;min-height:44px;display:flex;align-items:center;}
.tip-box{font-size:14px;color:#085041;background:#E1F5EE;border-radius:8px;padding:10px 12px;margin-bottom:12px;line-height:1.55;display:flex;align-items:flex-start;gap:6px;}
.tip-icon{flex-shrink:0;}
.side-row{padding:12px 16px;border-bottom:0.5px solid var(--border-light);}
.pv{font-size:14px;color:var(--text-primary);line-height:1.5;}
.nb{padding:12px 16px;}
.nl{font-size:12px;color:var(--text-tertiary);margin-bottom:3px;}
.nv{font-size:14px;color:var(--text-secondary);line-height:1.5;}
.sun-recipe-wrap{padding:14px 16px;}
.sun-recipe-note{font-size:14px;color:var(--text-secondary);margin-bottom:10px;line-height:1.5;}
.sun-recipe-sel select{font-size:16px;padding:10px 12px;border-radius:8px;border:0.5px solid var(--border-mid);background:var(--bg-primary);color:var(--text-primary);width:100%;margin-bottom:10px;min-height:44px;}
.shop-wrap{padding:14px 16px;}
.slt{font-size:15px;font-weight:500;color:var(--text-primary);margin-bottom:8px;}
.check-progress{font-size:13px;color:#085041;background:#E1F5EE;border-radius:6px;padding:6px 12px;margin-bottom:12px;display:inline-block;}
.check-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:0.5px solid var(--border-light);min-height:44px;}
.check-item:last-child{border-bottom:none;}
.check-item input[type=checkbox]{width:22px;height:22px;cursor:pointer;accent-color:#1D9E75;flex-shrink:0;}
.check-item label{font-size:15px;color:var(--text-primary);cursor:pointer;flex:1;line-height:1.4;}
.check-item.checked label{color:var(--text-tertiary);text-decoration:line-through;}
.check-qty{font-size:13px;color:var(--text-secondary);white-space:nowrap;}
.staple-section{margin-top:16px;padding-top:12px;border-top:0.5px solid var(--border-light);}
.staple-label{font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:6px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:flex-end;justify-content:center;}
.modal-overlay.on{display:flex;}
.modal{background:var(--bg-primary);border-radius:16px 16px 0 0;padding:0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--border-mid);border-radius:2px;margin:10px auto 0;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;}
.modal-title{font-size:16px;font-weight:500;color:var(--text-primary);}
.modal-close{width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-secondary);font-size:20px;margin:-8px -8px -8px 0;border-radius:50%;border:none;background:none;}
.modal-body{padding:0 16px 32px;}
.rc{font-size:14px;color:var(--text-primary);line-height:1.7;}
.rc h4{font-size:14px;font-weight:500;margin:10px 0 4px;}
.rc ul{padding-left:16px;margin-bottom:8px;}
.rc li{margin-bottom:4px;}
.rlink{display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-size:14px;color:#185FA5;border:0.5px solid #85B7EB;border-radius:8px;padding:10px 16px;text-decoration:none;min-height:44px;}
</style>
</head>
<body>
<div class="container">
  <h1 class="ttl">6月 夕食カレンダー</h1>
  <div class="leg">
    <div class="li"><div class="ldot"></div>買い物日</div>
    <div class="li"><span class="bq p">作り置き</span></div>
    <div class="li"><span class="bq q">時短</span></div>
  </div>
  <div class="g7" id="gr"></div>
  <div class="panel" id="pn">
    <div class="panel-head"><div class="ptitle" id="ptitle"></div></div>
    <div id="sun-msg-area"></div>
    <div id="panel-body"></div>
  </div>
</div>

<div class="modal-overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal(null)" aria-label="閉じる"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

  "鶏の唐揚げ":{steps:["鶏もも肉をしょうゆ・みりん・にんにく・しょうがに30分漬ける","片栗粉をまぶして170℃で5〜6分揚げる","二度揚げするとカリッと仕上がる"],pt:"下味をつけたまま冷凍保存できる"},
  "チャーハン":{steps:["強火で熱したフライパンに溶き卵とご飯を入れる","ハム・ねぎを加える","しょうゆ・塩コショウで味付け"],pt:"強火でパラパラに仕上げるのがコツ"},
  "サバの味噌煮":{steps:["サバ缶：みそ・みりん・砂糖・しょうがと合わせて5分煮る","生サバ：湯通しし、だし・みりん・みそ・砂糖で15分煮る"],pt:"サバ缶なら5分で完成"},
  "豚しゃぶサラダ":{steps:["豚ロースを熱湯でさっとゆでる","レタス・トマトを皿に盛る","豚肉をのせてポン酢をかける"],pt:"夏向けの冷製メニュー"},
  "ミートソースパスタ":{steps:["たまねぎ・にんにくを炒める","豚ひき肉を加えトマト缶・コンソメを加える","20分煮込みパスタと合わせる"],pt:"多めに作って冷凍しておくと翌週も使える"},
  "鶏の甘辛炒め":{steps:["鶏もも肉を一口大に切る","フライパンで焼き色をつける","しょうゆ・みりん・砂糖・にんにくで甘辛く絡める"],pt:"えのき・ピーマンを加えると彩りもアップ"},
  "あんかけ豆腐丼":{steps:["豚ひき肉を炒める","だし・しょうゆ・みりんを加えて豆腐を崩し入れる","水溶き片栗粉でとろみをつけご飯にかける"],pt:"豆腐1丁で2人分十分"},
  "豚キムチ炒め":{steps:["豚こまとキムチをフライパンで炒める","しょうゆ・ごま油で味を調える","ねぎを散らして完成"],pt:"辛さはキムチの量で調整"},
  "ぶり大根":{steps:["ぶりを湯通しして臭みを取る","大根を下茹でする","だし・しょうゆ・みりん・酒・砂糖でぶりと大根を20分煮る"],pt:"翌日の方が味が染みて美味しい"},
  "オムライス":{steps:["鶏もも肉とたまねぎを炒めケチャップで味付け","ご飯を加えてケチャップライスを作る","溶き卵を薄く焼いてご飯を包む"],pt:"残りご飯の消費に最適"},
  "豚汁定食":{steps:["豚バラ・大根・ごぼう・にんじんを一口大に切る","ごま油で炒めだし汁で煮る","みそを溶かして完成。焼き魚は別で焼く"],pt:"豚汁は翌日の昼も使える"},
  "鶏ときのこのクリーム煮":{steps:["鶏もも肉に塩コショウし焼き色をつける","しめじ・えのきを加えて炒める","牛乳・コンソメを加えて煮て水溶き片栗粉でとろみをつける"],pt:"生クリームの代わりに牛乳でコスト半分"},
};
const SUN_MENUS=["肉じゃが","鮭の塩焼き","豚の生姜焼き","チキンソテー","麻婆豆腐","豚汁＋焼き魚","豆腐ハンバーグ","カレー","親子丼","鶏の唐揚げ","ミートソースパスタ","サバの味噌煮","ぶり大根","オムライス","豚汁定食"];
const checkState={};

function openModal(name){
  const r=RC[name];const q=encodeURIComponent(name);
  document.getElementById("modal-title").textContent=name;
  let h="";
  if(r){h+=`<div class="rc"><h4>作り方</h4><ul>`;r.steps.forEach(s=>{h+=`<li>${s}</li>`;});h+=`</ul><h4>ポイント</h4><p>${r.pt}</p></div>`;}
  h+=`<a class="rlink" href="https://cookpad.com/search/${q}" target="_blank" rel="noopener"><i class="ti ti-external-link" style="font-size:14px" aria-hidden="true"></i>クックパッドで見る</a>`;
  document.getElementById("modal-body").innerHTML=h;
  document.getElementById("overlay").classList.add("on");
}
function closeModal(e){
  if(e===null||e.target===document.getElementById("overlay"))
    document.getElementById("overlay").classList.remove("on");
}
function shopListHTML(d){
  const items=SHOP_ITEMS[d];if(!items)return"";
  const sk=`shop_${d}`;if(!checkState[sk])checkState[sk]={};
  const total=items.length;const done=items.filter((_,i)=>checkState[sk][i]).length;
  let h=`<div class="slt">買い物リスト</div><div class="check-progress" id="prog-${d}">${done}/${total} 完了</div>`;
  items.forEach((item,i)=>{
    const ck=checkState[sk][i]?"checked":"";const cc=checkState[sk][i]?"checked":"";
    h+=`<div class="check-item ${cc}" id="ci-${d}-${i}"><input type="checkbox" id="cb-${d}-${i}" ${ck} onchange="toggleItem(${d},${i})"><label for="cb-${d}-${i}">${item.n}</label><span class="check-qty">${item.q||""}</span></div>`;
  });
  h+=`<div class="staple-section"><div class="staple-label">常備品（切らしたら補充）</div>`;
  const stk=`staple_${d}`;if(!checkState[stk])checkState[stk]={};
  STAPLES.forEach((item,i)=>{
    const ck=checkState[stk][i]?"checked":"";const cc=checkState[stk][i]?"checked":"";
    h+=`<div class="check-item ${cc}" id="sci-${d}-${i}"><input type="checkbox" id="scb-${d}-${i}" ${ck} onchange="toggleStaple(${d},${i})"><label for="scb-${d}-${i}">${item.n}</label></div>`;
  });
  h+=`</div>`;return h;
}
function toggleItem(d,i){
  const sk=`shop_${d}`;if(!checkState[sk])checkState[sk]={};
  const cb=document.getElementById(`cb-${d}-${i}`);checkState[sk][i]=cb.checked;
  document.getElementById(`ci-${d}-${i}`).classList.toggle("checked",cb.checked);
  const done=SHOP_ITEMS[d].filter((_,j)=>checkState[sk][j]).length;
  const p=document.getElementById(`prog-${d}`);if(p)p.textContent=`${done}/${SHOP_ITEMS[d].length} 完了`;
}
function toggleStaple(d,i){
  const stk=`staple_${d}`;if(!checkState[stk])checkState[stk]={};
  const cb=document.getElementById(`scb-${d}-${i}`);checkState[stk][i]=cb.checked;
  document.getElementById(`sci-${d}-${i}`).classList.toggle("checked",cb.checked);
}
function switchDTab(tabId,groupId){
  document.querySelectorAll(`[data-group="${groupId}"]`).forEach(el=>{el.classList.toggle("on",el.dataset.tab===tabId);});
}
function renderDinner(d){
  const info=D[d];const hasSH=SH.has(d);let h="";
  if(hasSH){h+=`<div class="dtabs"><div class="dtab on" data-group="d${d}" data-tab="dinner" onclick="switchDTab('dinner','d${d}')">夕食</div><div class="dtab" data-group="d${d}" data-tab="shop" onclick="switchDTab('shop','d${d}')">買い物リスト</div></div>`;}
  h+=`<div class="dsec on" data-group="d${d}" data-tab="dinner">`;
  if(info){
    const mn=info.m.replace(/'/g,"\\'");
    h+=`<div class="psec"><div class="pl">夕食メイン</div><div class="main-row"><span class="main-val">${info.m}</span><span class="recipe-link" role="button" tabindex="0" onclick="openModal('${mn}')">レシピを見る</span></div><div class="tip-box"><span class="tip-icon">💡</span><span>${info.t}</span></div></div>`;
    h+=`<div class="side-row"><div class="pl">副菜・汁物</div><div class="pv">${info.s}</div></div>`;
    h+=`<div class="nb"><div class="nl">保育園の昼ご飯（被り防止）</div><div class="nv">${info.n}</div></div>`;
  }else{h+=`<div class="psec"><div class="pv" style="color:var(--text-secondary)">献立なし</div></div>`;}
  h+=`</div>`;
  if(hasSH){h+=`<div class="dsec" data-group="d${d}" data-tab="shop"><div class="shop-wrap">${shopListHTML(d)}</div></div>`;}
  return h;
}
function renderSunday(d){
  const idx=Math.min(Math.floor((d-1)/7),SUN_MSGS.length-1);
  document.getElementById("sun-msg-area").innerHTML=`<div class="sun-msg"><span class="sun-msg-icon"><i class="ti ti-sun" aria-hidden="true"></i></span><span>${SUN_MSGS[idx]}</span></div>`;
  const hasSH=SH.has(d);let h="";
  if(hasSH){h+=`<div class="dtabs"><div class="dtab on" data-group="s${d}" data-tab="recipe" onclick="switchDTab('recipe','s${d}')">レシピ</div><div class="dtab" data-group="s${d}" data-tab="shop" onclick="switchDTab('shop','s${d}')">買い物リスト</div></div>`;}
  h+=`<div class="dsec on" data-group="s${d}" data-tab="recipe"><div class="sun-recipe-wrap"><p class="sun-recipe-note">料理する場合はメニューを選ぶとレシピを確認できます。</p><div class="sun-recipe-sel"><select id="sun-sel-${d}" onchange="onSunSel(${d})"><option value="">メニューを選択してください</option>`;
  SUN_MENUS.forEach(m=>{h+=`<option value="${m}">${m}</option>`;});
  h+=`</select><div id="sun-rc-${d}"></div></div></div></div>`;
  if(hasSH){h+=`<div class="dsec" data-group="s${d}" data-tab="shop"><div class="shop-wrap">${shopListHTML(d)}</div></div>`;}
  return h;
}
function onSunSel(d){
  const sel=document.getElementById(`sun-sel-${d}`);const rc=document.getElementById(`sun-rc-${d}`);
  if(!sel.value){rc.innerHTML="";return;}
  const name=sel.value;const r=RC[name];const q=encodeURIComponent(name);
  let h="";
  if(r){h+=`<div class="rc"><h4>作り方</h4><ul>`;r.steps.forEach(s=>{h+=`<li>${s}</li>`;});h+=`</ul><h4>ポイント</h4><p>${r.pt}</p></div>`;}
  h+=`<a class="rlink" href="https://cookpad.com/search/${q}" target="_blank" rel="noopener"><i class="ti ti-external-link" style="font-size:14px" aria-hidden="true"></i>クックパッドで見る</a>`;
  rc.innerHTML=h;
}
function openPanel(d){
  const dow=new Date(2026,5,d).getDay();const isSun=dow===0;
  document.getElementById("ptitle").textContent=`6月${d}日（${DOW[dow]}）`;
  document.getElementById("sun-msg-area").innerHTML="";
  document.getElementById("panel-body").innerHTML=isSun?renderSunday(d):renderDinner(d);
  document.getElementById("pn").classList.add("on");
  document.getElementById("pn").scrollIntoView({behavior:"smooth",block:"nearest"});
}
const gr=document.getElementById("gr");
DOW.forEach((d,i)=>{const e=document.createElement("div");e.className="dh"+(i===0?" su":i===6?" sa":"");e.textContent=d;gr.appendChild(e);});
for(let i=0;i<1;i++){const e=document.createElement("div");e.className="cell emp";gr.appendChild(e);}
for(let d=1;d<=30;d++){
  const dow=new Date(2026,5,d).getDay();const cell=document.createElement("div");
  let cls="cell";if(dow===0)cls+=" csu";if(SH.has(d))cls+=" sh";cell.className=cls;
  cell.setAttribute("role","button");cell.setAttribute("tabindex","0");cell.setAttribute("aria-label",`6月${d}日`);
  const dn=document.createElement("div");dn.className="dn";
  dn.innerHTML=`${d}`+(SH.has(d)?'<span class="sp" aria-hidden="true"></span>':'');cell.appendChild(dn);
  const info=D[d];const isSun=dow===0;
  if(info){
    const mm=document.createElement("div");mm.className="mm";mm.textContent=info.m;cell.appendChild(mm);
    const bq=document.createElement("span");bq.className="bqs "+(info.b==="p"?"p":"q");bq.textContent=info.b==="p"?"作り置き":"時短";cell.appendChild(bq);
  }else if(isSun){
    const ms=document.createElement("div");ms.className="ms-off";ms.style.color="#993C1D";ms.textContent="お休み";cell.appendChild(ms);
  }else if(dow===6){
    const ms=document.createElement("div");ms.className="ms-off";ms.textContent="お休み";cell.appendChild(ms);
  }
  const handler=()=>{document.querySelectorAll(".cell").forEach(c=>c.classList.remove("sel"));cell.classList.add("sel");openPanel(d);};
  cell.addEventListener("click",handler);
  cell.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" ")handler();});
  gr.appendChild(cell);
}
</script>
</body>
</html>
