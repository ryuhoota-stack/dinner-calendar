<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>夕食カレンダー</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
/* ===== Apple風カラーシステム =====
   ライト：systemGroupedBackground を下地に、カードは純白＋淡い影でコントラストを出す
   ダーク：真っ黒を避け elevated グレー（#1C1C1E 下地 / #2C2C2E カード）で目に優しく */
:root{
  --bg:#F2F2F7;
  --card:#FFFFFF;
  --card-press:#E5E5EA;
  --text:#1C1C1E;
  --text-2:#5B5B61;
  --text-3:#8E8E93;
  --sep:rgba(60,60,67,0.16);
  --sep-strong:rgba(60,60,67,0.28);
  --accent:#1D9E75;
  --accent-press:#178A65;
  --blue:#0A6CD6;
  --sun:#C0392B;
  --sat:#1F6FC0;
  --shop-bg:#E3F6EE;
  --shop-dot:#1D9E75;
  --tip-bg:#E3F6EE;
  --tip-text:#0A5C45;
  --prep-bg:#FBEAD0;--prep-text:#7A4A0A;
  --quick-bg:#E3F6EE;--quick-text:#0A5C45;
  --heavy-bg:#DCEBFB;--heavy-text:#0B4A88;
  --seg-track:rgba(118,118,128,0.12);
  --seg-on:#FFFFFF;
  --shadow:0 1px 3px rgba(0,0,0,0.10),0 0 0 0.5px rgba(0,0,0,0.04);
  --shadow-lg:0 8px 28px rgba(0,0,0,0.18);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1C1C1E;
    --card:#2C2C2E;
    --card-press:#3A3A3C;
    --text:#FFFFFF;
    --text-2:#B6B6BC;
    --text-3:#8E8E93;
    --sep:rgba(255,255,255,0.14);
    --sep-strong:rgba(255,255,255,0.22);
    --accent:#30D158;
    --accent-press:#28B84C;
    --blue:#64A9FF;
    --sun:#FF8A7A;
    --sat:#6CB1FF;
    --shop-bg:rgba(48,209,88,0.16);
    --shop-dot:#30D158;
    --tip-bg:rgba(48,209,88,0.14);
    --tip-text:#86E0A4;
    --prep-bg:rgba(255,159,10,0.20);--prep-text:#FFD166;
    --quick-bg:rgba(48,209,88,0.18);--quick-text:#86E0A4;
    --heavy-bg:rgba(100,169,255,0.22);--heavy-text:#9CC6FF;
    --seg-track:rgba(118,118,128,0.32);
    --seg-on:#5B5B61;
    --shadow:0 1px 3px rgba(0,0,0,0.5),0 0 0 0.5px rgba(255,255,255,0.06);
    --shadow-lg:0 8px 28px rgba(0,0,0,0.6);
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;-webkit-text-size-adjust:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:14px 12px calc(14px + env(safe-area-inset-bottom));}
.container{max-width:480px;margin:0 auto;}
.ttl{font-size:22px;font-weight:700;letter-spacing:-0.02em;color:var(--text);margin-bottom:12px;}

/* 月切替セグメントコントロール */
.seg{display:inline-flex;background:var(--seg-track);border-radius:9px;padding:2px;gap:2px;margin-bottom:12px;width:100%;}
.seg button{flex:1;border:none;background:transparent;color:var(--text);font-size:14px;font-weight:600;padding:7px 10px;border-radius:7px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s;min-height:34px;}
.seg button.on{background:var(--seg-on);box-shadow:0 1px 2px rgba(0,0,0,0.12);}

.leg{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
.li{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text-2);}
.ldot{width:8px;height:8px;border-radius:50%;background:var(--shop-dot);flex-shrink:0;}
.bq{display:inline-block;font-size:11px;padding:2px 7px;border-radius:8px;font-weight:600;}
.bq.p{background:var(--prep-bg);color:var(--prep-text);}.bq.q{background:var(--quick-bg);color:var(--quick-text);}

.g7{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.dh{text-align:center;font-size:12px;color:var(--text-2);padding:4px 0 6px;font-weight:600;}
.dh.su{color:var(--sun);}.dh.sa{color:var(--sat);}
.cell{background:var(--card);border-radius:10px;box-shadow:var(--shadow);padding:5px 4px;min-height:66px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .08s;}
.cell:active{transform:scale(0.96);background:var(--card-press);}
.cell.emp{background:transparent;box-shadow:none;cursor:default;}
.cell.emp:active{transform:none;}
.cell.sh{background:var(--shop-bg);}
.cell.sel{box-shadow:0 0 0 2px var(--accent),var(--shadow);}
.cell.csu .dn{color:var(--sun);}
.cell.csa .dn{color:var(--sat);}
.dn{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;display:flex;align-items:center;gap:3px;line-height:1;}
.sp{width:5px;height:5px;border-radius:50%;background:var(--shop-dot);display:inline-block;flex-shrink:0;}
.mm{font-size:9.5px;font-weight:500;color:var(--text);line-height:1.25;margin-bottom:1px;word-break:break-all;}
.bqs{display:inline-block;font-size:8px;padding:1px 4px;border-radius:5px;margin-top:2px;font-weight:600;}
.bqs.p{background:var(--prep-bg);color:var(--prep-text);}.bqs.q{background:var(--quick-bg);color:var(--quick-text);}
.ms-off{font-size:9px;color:var(--text-3);}
.ms-hol{font-size:9px;color:var(--sun);font-weight:600;}

/* 詳細＝ボトムシート（Google Map風ハーフモーダル） */
.sheet-scrim{position:fixed;inset:0;background:transparent;z-index:40;display:none;}
.sheet-scrim.on{display:block;}
.sheet{position:fixed;left:0;right:0;bottom:0;margin:0 auto;width:100%;max-width:480px;
  background:var(--card);border-radius:18px 18px 0 0;box-shadow:var(--shadow-lg);
  z-index:50;display:flex;flex-direction:column;max-height:88vh;
  transform:translateY(110%);transition:transform .32s cubic-bezier(.32,.72,0,1);
  padding-bottom:env(safe-area-inset-bottom);}
.sheet.on{transform:translateY(0);}
/* 背景スクロールロック中もシートは画面下部に固定 */
body.sheet-open{position:fixed;width:100%;overflow:hidden;}
.sheet-grab{flex-shrink:0;position:relative;cursor:grab;touch-action:none;}
.sheet-grab:active{cursor:grabbing;}
.sheet-handle{width:38px;height:5px;background:var(--sep-strong);border-radius:3px;margin:8px auto 2px;}
.sheet-close{position:absolute;top:4px;right:8px;width:44px;height:44px;display:none;align-items:center;justify-content:center;border:none;background:none;color:var(--text-2);font-size:20px;cursor:pointer;border-radius:50%;-webkit-tap-highlight-color:transparent;z-index:2;}
.sheet-close:active{background:var(--card-press);}
.sheet.full .sheet-close{display:flex;} /* フルモーダル時のみ閉じるボタン表示 */
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 10px 12px;border-bottom:0.5px solid var(--sep);}
.sheet.full .panel-head{padding-top:38px;} /* 閉じるボタンと矢印が重ならないよう余白を確保 */
/* 買い物リストのコーナー（カテゴリ）見出し */
.shop-cat{font-size:12px;font-weight:700;color:var(--accent);margin:16px 0 2px;display:flex;align-items:center;gap:5px;letter-spacing:0.02em;}
.shop-cat:first-of-type{margin-top:4px;}
.nav-arrow{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:none;background:none;color:var(--blue);font-size:22px;cursor:pointer;border-radius:50%;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
.nav-arrow:active{background:var(--card-press);}
.nav-arrow:disabled{color:var(--text-3);opacity:0.4;cursor:default;}
.nav-arrow:disabled:active{background:none;}
.ptitle{font-size:17px;font-weight:600;color:var(--text);text-align:center;flex:1;}
.sun-msg{background:var(--prep-bg);padding:12px 16px;font-size:14px;color:var(--prep-text);line-height:1.6;display:flex;align-items:flex-start;gap:8px;}
.sun-msg-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.dtabs{display:flex;border-bottom:0.5px solid var(--sep);}
.dtab{flex:1;padding:13px 8px;font-size:14px;font-weight:600;text-align:center;cursor:pointer;color:var(--text-2);border-bottom:2px solid transparent;-webkit-tap-highlight-color:transparent;}
.dtab.on{color:var(--accent);border-bottom:2px solid var(--accent);}
.dsec{display:none;}.dsec.on{display:block;}
.psec{padding:16px;}
.pl{font-size:12px;color:var(--text-2);font-weight:600;margin-bottom:5px;letter-spacing:0.02em;}
.main-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;}
.main-val{font-size:18px;font-weight:600;color:var(--text);}
.recipe-link{font-size:14px;color:var(--blue);cursor:pointer;white-space:nowrap;min-height:44px;display:flex;align-items:center;font-weight:500;}
.tip-box{font-size:14px;color:var(--tip-text);background:var(--tip-bg);border-radius:10px;padding:11px 13px;margin-bottom:4px;line-height:1.55;display:flex;align-items:flex-start;gap:6px;}
.tip-icon{flex-shrink:0;}
.side-row{padding:14px 16px;border-bottom:0.5px solid var(--sep);}
.pv{font-size:15px;color:var(--text);line-height:1.5;}
.nb{padding:14px 16px;}
.nl{font-size:12px;color:var(--text-3);margin-bottom:4px;}
.nv{font-size:14px;color:var(--text-2);line-height:1.5;}
.sun-recipe-wrap{padding:16px;}
.sun-recipe-note{font-size:14px;color:var(--text-2);margin-bottom:12px;line-height:1.5;}
.sun-recipe-sel select{font-size:16px;padding:12px;border-radius:10px;border:0.5px solid var(--sep-strong);background:var(--card);color:var(--text);width:100%;margin-bottom:10px;min-height:44px;-webkit-appearance:none;appearance:none;}
.shop-wrap{padding:16px;}
.shop-papa{font-size:13px;color:var(--tip-text);background:var(--tip-bg);border-radius:8px;padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;gap:6px;font-weight:500;}
.slt{font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px;}
.check-progress{font-size:13px;color:var(--tip-text);background:var(--tip-bg);border-radius:6px;padding:6px 12px;margin-bottom:12px;display:inline-block;font-weight:600;}
.check-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:0.5px solid var(--sep);min-height:44px;}
.check-item:last-child{border-bottom:none;}
.check-item input[type=checkbox]{width:22px;height:22px;cursor:pointer;accent-color:var(--accent);flex-shrink:0;}
.check-item label{font-size:15px;color:var(--text);cursor:pointer;flex:1;line-height:1.4;}
.check-item.checked label{color:var(--text-3);text-decoration:line-through;}
.check-qty{font-size:13px;color:var(--text-2);white-space:nowrap;}
.heavy-badge{font-size:11px;padding:1px 6px;border-radius:6px;background:var(--heavy-bg);color:var(--heavy-text);white-space:nowrap;margin-left:6px;font-weight:600;}
.staple-section{margin-top:16px;padding-top:12px;border-top:0.5px solid var(--sep);}
.staple-label{font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:6px;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:flex-end;justify-content:center;}
.modal-overlay.on{display:flex;}
.modal{background:var(--card);border-radius:18px 18px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg);padding-bottom:env(safe-area-inset-bottom);}
.modal-handle{width:36px;height:5px;background:var(--sep-strong);border-radius:3px;margin:10px auto 0;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;}
.modal-title{font-size:17px;font-weight:600;color:var(--text);}
.modal-close{width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);font-size:20px;margin:-8px -8px -8px 0;border-radius:50%;border:none;background:none;}
.modal-body{padding:0 16px 32px;}
.rc{font-size:15px;color:var(--text);line-height:1.7;}
.rc h4{font-size:14px;font-weight:600;margin:12px 0 4px;color:var(--text-2);}
.rc ul{padding-left:18px;margin-bottom:8px;}
.rc li{margin-bottom:5px;}
.rlink{display:inline-flex;align-items:center;gap:5px;margin-top:12px;font-size:15px;color:var(--blue);border:0.5px solid var(--blue);border-radius:10px;padding:11px 16px;text-decoration:none;min-height:44px;font-weight:500;}
</style>
</head>
<body>
<div class="container">
  <h1 class="ttl">夕食カレンダー</h1>
  <div class="seg" id="seg" role="tablist" aria-label="月の切り替え"></div>
  <div class="leg">
    <div class="li"><div class="ldot"></div>買い物日</div>
    <div class="li"><span class="bq p">作り置き</span></div>
    <div class="li"><span class="bq q">時短</span></div>
  </div>
  <div class="g7" id="gr"></div>
</div>

<div class="sheet-scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="pn" role="dialog" aria-modal="true" aria-labelledby="ptitle">
  <div class="sheet-grab" id="grab">
    <div class="sheet-handle"></div>
    <button class="sheet-close" id="sheetClose" aria-label="閉じる"><i class="ti ti-x" aria-hidden="true"></i></button>
    <div class="panel-head">
      <button class="nav-arrow" id="prevDay" aria-label="前の日" onclick="ENGINE.go(-1)"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
      <div class="ptitle" id="ptitle"></div>
      <button class="nav-arrow" id="nextDay" aria-label="次の日" onclick="ENGINE.go(1)"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
    </div>
  </div>
  <div class="sheet-body">
    <div id="sun-msg-area"></div>
    <div id="panel-body"></div>
  </div>
</div>

<div class="modal-overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal(null)" aria-label="閉じる"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
/* =========================================================================
   夕食カレンダー UIエンジン（このファイルは毎月触らない）
   月のデータは data/YYYY-MM.js が registerMonth(...) で登録する。
   曜日・日数は new Date から動的計算するので、月ごとのズレは起きない。
   ========================================================================= */
const DOW=["日","月","火","水","木","金","土"];
const SUN_MSGS=["今週もお疲れさまでした！日曜日はゆっくり休みましょう。","1週間頑張りましたね。今日はのんびり過ごしてください。","お疲れさまでした。日曜日は家族でゆっくりとした時間を。","今週もお疲れさまでした。今日くらいはゆっくり休んでください。","1ヶ月お疲れさまでした！しっかり休んで英気を養いましょう。"];
const STAPLES=[{n:"米"},{n:"卵"},{n:"豆腐"},{n:"みそ"},{n:"しょうゆ"},{n:"みりん"},{n:"ごま油"},{n:"片栗粉"},{n:"冷凍うどん"},{n:"キムチ"},{n:"缶詰類"}];

const MONTHS={};            // key -> month object
function registerMonth(m){
  m._sh=new Set(m.SH||[]);
  m.holidays=m.holidays||{};
  m.SHOP_ITEMS=m.SHOP_ITEMS||{};
  m.RC=m.RC||{};
  m.SUN_MENUS=m.SUN_MENUS||Object.keys(m.RC); // 未指定ならレシピ全件
  MONTHS[m.key]=m;
}
function daysInMonth(y,mo){return new Date(y,mo,0).getDate();}      // mo:1-12
function firstWeekday(y,mo){return new Date(y,mo-1,1).getDay();}

const checkState={};

const ENGINE={
  visible:[],   // 表示する月キー（昇順）：[先月, 最新月]
  active:null,  // 現在グリッド表示中の月キー
  cur:null,     // {key, day} 選択中の日
  order:[],     // 全表示日の通し配列 [{key,day}]（矢印ナビ用）

  init(){
    const keys=Object.keys(MONTHS).sort();          // 昇順
    this.visible=keys.slice(-2);                     // 最新2ヶ月
    // 矢印用：表示中2ヶ月の全日付を時系列で
    this.order=[];
    this.visible.forEach(k=>{
      const m=MONTHS[k];const dim=daysInMonth(m.year,m.month);
      for(let d=1;d<=dim;d++)this.order.push({key:k,day:d});
    });
    this.renderSeg();
    this.show(this.visible[this.visible.length-1]); // 既定は最新月
  },
  renderSeg(){
    const seg=document.getElementById("seg");seg.innerHTML="";
    this.visible.forEach(k=>{
      const m=MONTHS[k];const b=document.createElement("button");
      b.textContent=`${m.year}年${m.month}月`;b.dataset.key=k;b.setAttribute("role","tab");
      b.onclick=()=>this.show(k);
      seg.appendChild(b);
    });
    if(this.visible.length<2){seg.style.display="none";}
  },
  show(key){
    this.active=key;
    document.querySelectorAll("#seg button").forEach(b=>b.classList.toggle("on",b.dataset.key===key));
    renderGrid(key);
    // シートが開いていて、選択日が別の月なら閉じる
    if(this.cur&&this.cur.key!==key)closeSheet();
  },
  open(key,day){
    if(key!==this.active)this.show(key);
    this.cur={key,day};
    // セル選択ハイライト
    document.querySelectorAll(".cell").forEach(c=>c.classList.remove("sel"));
    const cell=document.querySelector(`.cell[data-day="${day}"]`);
    if(cell)cell.classList.add("sel");
    openPanel(key,day);
    this.updateArrows();
  },
  go(delta){
    if(!this.cur)return;
    const i=this.order.findIndex(o=>o.key===this.cur.key&&o.day===this.cur.day);
    const ni=i+delta;
    if(ni<0||ni>=this.order.length)return;
    const t=this.order[ni];
    this.open(t.key,t.day);
  },
  updateArrows(){
    const i=this.order.findIndex(o=>o.key===this.cur.key&&o.day===this.cur.day);
    document.getElementById("prevDay").disabled=(i<=0);
    document.getElementById("nextDay").disabled=(i>=this.order.length-1);
  },
};

function renderGrid(key){
  const m=MONTHS[key];const gr=document.getElementById("gr");gr.innerHTML="";
  DOW.forEach((d,i)=>{const e=document.createElement("div");e.className="dh"+(i===0?" su":i===6?" sa":"");e.textContent=d;gr.appendChild(e);});
  const fw=firstWeekday(m.year,m.month);
  const dim=daysInMonth(m.year,m.month);
  for(let i=0;i<fw;i++){const e=document.createElement("div");e.className="cell emp";gr.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const dow=new Date(m.year,m.month-1,d).getDay();
    const isSun=dow===0,isSat=dow===6,isHol=!!m.holidays[d],hasSH=m._sh.has(d);
    const cell=document.createElement("div");
    let cls="cell";if(isSun)cls+=" csu";if(isSat)cls+=" csa";if(hasSH)cls+=" sh";cell.className=cls;
    cell.dataset.day=d;
    cell.setAttribute("role","button");cell.setAttribute("tabindex","0");cell.setAttribute("aria-label",`${m.month}月${d}日`);
    const dn=document.createElement("div");dn.className="dn";
    dn.innerHTML=`${d}`+(hasSH?'<span class="sp" aria-hidden="true"></span>':'');cell.appendChild(dn);
    const info=m.D[d];
    if(info){
      const mm=document.createElement("div");mm.className="mm";mm.textContent=info.m;cell.appendChild(mm);
      const bq=document.createElement("span");bq.className="bqs "+(info.b==="p"?"p":"q");bq.textContent=info.b==="p"?"作り置き":"時短";cell.appendChild(bq);
    }else if(isHol){
      const ms=document.createElement("div");ms.className="ms-hol";ms.textContent=m.holidays[d];cell.appendChild(ms);
    }else if(isSun||isSat){
      const ms=document.createElement("div");ms.className="ms-off";ms.style.color=isSun?"var(--sun)":"";ms.textContent="お休み";cell.appendChild(ms);
    }
    const handler=()=>ENGINE.open(key,d);
    cell.addEventListener("click",handler);
    cell.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();handler();}});
    gr.appendChild(cell);
  }
  // 表示中の月が選択日を含むなら再ハイライト
  if(ENGINE.cur&&ENGINE.cur.key===key){
    const c=document.querySelector(`.cell[data-day="${ENGINE.cur.day}"]`);if(c)c.classList.add("sel");
  }
}

function openModal(key,name){
  const m=MONTHS[key];const r=m.RC[name];const q=encodeURIComponent(name);
  document.getElementById("modal-title").textContent=name;
  let h="";
  if(r){h+=`<div class="rc"><h4>作り方</h4><ul>`;r.steps.forEach(s=>{h+=`<li>${s}</li>`;});h+=`</ul><h4>ポイント</h4><p>${r.pt}</p></div>`;}
  h+=`<a class="rlink" href="https://cookpad.com/search/${q}" target="_blank" rel="noopener"><i class="ti ti-external-link" style="font-size:14px" aria-hidden="true"></i>クックパッドで見る</a>`;
  document.getElementById("modal-body").innerHTML=h;
  document.getElementById("overlay").classList.add("on");
}
function closeModal(e){
  if(e===null||e.target===document.getElementById("overlay"))
    document.getElementById("overlay").classList.remove("on");
}

/* スーパーのコーナー順に並べるカテゴリ定義（上から回る順）。
   item に c:"野菜" 等を指定すれば優先。未指定なら名前から自動判定。 */
const SHOP_CATS=[
  {key:"野菜・果物", icon:"ti-carrot", re:/(野菜|じゃがいも|玉ねぎ|たまねぎ|ねぎ|長ねぎ|万能ねぎ|にんじん|大根|キャベツ|白菜|もやし|きゅうり|ピーマン|パプリカ|なす|ナス|トマト|レタス|ほうれん草|こまつな|小松菜|ブロッコリー|ごぼう|れんこん|かぼちゃ|さつまいも|きのこ|しめじ|えのき|しいたけ|まいたけ|エリンギ|にんにく|しょうが|生姜|レモン|バナナ|みかん|りんご|果物|アボカド|豆苗|ニラ|にら|セロリ|オクラ|とうもろこし|枝豆)/},
  {key:"鮮魚", icon:"ti-fish", re:/(魚|鮭|サケ|鯖|さば|サバ|ぶり|ブリ|かじき|カジキ|たら|タラ|さわら|サワラ|あじ|アジ|いわし|イワシ|まぐろ|マグロ|さんま|サンマ|ほっけ|干物|切り身|えび|エビ|いか|イカ|たこ|タコ|あさり|しじみ|しらす|刺身)/},
  {key:"精肉", icon:"ti-meat", re:/(肉|鶏|豚|牛|ひき肉|挽肉|バラ|もも|ロース|ささみ|むね|手羽|ハム|ベーコン|ウインナー|ソーセージ)/},
  {key:"豆腐・大豆製品", icon:"ti-cheese", re:/(豆腐|油揚げ|厚揚げ|納豆|がんもどき|おから|高野豆腐)/},
  {key:"卵・乳製品", icon:"ti-egg", re:/(卵|たまご|牛乳|バター|チーズ|ヨーグルト|生クリーム|牛乳パック)/},
  {key:"パン・麺・主食", icon:"ti-bread", re:/(米|パン|食パン|バゲット|うどん|そば|スパゲッティ|パスタ|焼きそば|中華麺|ラーメン|そうめん|もち|餅)/},
  {key:"乾物・缶詰・常温", icon:"ti-package", re:/(缶|わかめ|海苔|のり|乾燥|ひじき|切り干し|春雨|ルー|ルウ|だしパック|乾麺)/},
  {key:"調味料", icon:"ti-bottle", re:/(しょうゆ|醤油|みそ|味噌|みりん|酢|砂糖|塩|こしょう|コショウ|油|ごま油|サラダ油|オリーブ|ケチャップ|ソース|ポン酢|めんつゆ|だし|マヨ|片栗粉|小麦粉|カレー粉|甜麺醤|豆板醤|オイスター|紅生姜|わさび|からし|コンソメ|鶏がら)/},
];
function shopCatIndex(item){
  if(item.c){const i=SHOP_CATS.findIndex(c=>c.key===item.c);if(i>=0)return i;}
  for(let i=0;i<SHOP_CATS.length;i++){if(SHOP_CATS[i].re.test(item.n))return i;}
  return SHOP_CATS.length; // その他
}
function shopListHTML(key,d){
  const m=MONTHS[key];const data=m.SHOP_ITEMS[d];if(!data)return"";
  const items=data.items;const isPapa=data.papa;
  const sk=`${key}_shop_${d}`;if(!checkState[sk])checkState[sk]={};
  const total=items.length;const done=items.filter((_,i)=>checkState[sk][i]).length;
  let h="";
  if(isPapa)h+=`<div class="shop-papa"><i class="ti ti-users" style="font-size:16px" aria-hidden="true"></i>パパと一緒に行く日</div>`;
  h+=`<div class="slt">買い物リスト</div><div class="check-progress" id="prog-${d}">${done}/${total} 完了</div>`;
  // コーナー（カテゴリ）ごとにグルーピング。元のindexは保持してチェック状態を維持
  const groups={};
  items.forEach((item,i)=>{const gi=shopCatIndex(item);(groups[gi]=groups[gi]||[]).push({item,i});});
  Object.keys(groups).map(Number).sort((a,b)=>a-b).forEach(gi=>{
    const cat=SHOP_CATS[gi];
    const label=cat?cat.key:"その他";const icon=cat?cat.icon:"ti-shopping-cart";
    h+=`<div class="shop-cat"><i class="ti ${icon}" aria-hidden="true"></i>${label}</div>`;
    groups[gi].forEach(({item,i})=>{
      const cc=checkState[sk][i]?"checked":"";
      h+=`<div class="check-item ${cc}" id="ci-${d}-${i}"><input type="checkbox" id="cb-${d}-${i}" ${cc} onchange="toggleItem('${key}',${d},${i})"><label for="cb-${d}-${i}">${item.n}${item.h?'<span class="heavy-badge">重め</span>':''}</label><span class="check-qty">${item.q||""}</span></div>`;
    });
  });
  h+=`<div class="staple-section"><div class="staple-label">常備品（切らしたら補充）</div>`;
  const stk=`${key}_staple_${d}`;if(!checkState[stk])checkState[stk]={};
  STAPLES.forEach((item,i)=>{
    const cc=checkState[stk][i]?"checked":"";
    h+=`<div class="check-item ${cc}" id="sci-${d}-${i}"><input type="checkbox" id="scb-${d}-${i}" ${cc} onchange="toggleStaple('${key}',${d},${i})"><label for="scb-${d}-${i}">${item.n}</label></div>`;
  });
  h+=`</div>`;return h;
}
function toggleItem(key,d,i){
  const sk=`${key}_shop_${d}`;if(!checkState[sk])checkState[sk]={};
  const cb=document.getElementById(`cb-${d}-${i}`);checkState[sk][i]=cb.checked;
  document.getElementById(`ci-${d}-${i}`).classList.toggle("checked",cb.checked);
  const items=MONTHS[key].SHOP_ITEMS[d].items;
  const done=items.filter((_,j)=>checkState[sk][j]).length;
  const p=document.getElementById(`prog-${d}`);if(p)p.textContent=`${done}/${items.length} 完了`;
}
function toggleStaple(key,d,i){
  const stk=`${key}_staple_${d}`;if(!checkState[stk])checkState[stk]={};
  const cb=document.getElementById(`scb-${d}-${i}`);checkState[stk][i]=cb.checked;
  document.getElementById(`sci-${d}-${i}`).classList.toggle("checked",cb.checked);
}
function switchDTab(tabId,groupId){
  document.querySelectorAll(`[data-group="${groupId}"]`).forEach(el=>{el.classList.toggle("on",el.dataset.tab===tabId);});
  updateSheetMode(); // タブ切替で高さが変わるので再判定（買い物リスト=フル等）
}

function renderDinner(key,d){
  const m=MONTHS[key];const info=m.D[d];const hasSH=m._sh.has(d);let h="";
  if(hasSH){h+=`<div class="dtabs"><div class="dtab on" data-group="d${d}" data-tab="dinner" onclick="switchDTab('dinner','d${d}')">夕食</div><div class="dtab" data-group="d${d}" data-tab="shop" onclick="switchDTab('shop','d${d}')">買い物リスト</div></div>`;}
  h+=`<div class="dsec on" data-group="d${d}" data-tab="dinner">`;
  if(info){
    const mn=info.m.replace(/'/g,"\\'");
    h+=`<div class="psec"><div class="pl">夕食メイン</div><div class="main-row"><span class="main-val">${info.m}</span><span class="recipe-link" role="button" tabindex="0" onclick="openModal('${key}','${mn}')">レシピを見る ›</span></div><div class="tip-box"><span class="tip-icon">💡</span><span>${info.t}</span></div></div>`;
    h+=`<div class="side-row"><div class="pl">副菜・汁物</div><div class="pv">${info.s}</div></div>`;
    h+=`<div class="nb"><div class="nl">保育園の昼ご飯（被り防止）</div><div class="nv">${info.n}</div></div>`;
  }else{h+=`<div class="psec"><div class="pv" style="color:var(--text-2)">献立なし</div></div>`;}
  h+=`</div>`;
  if(hasSH){h+=`<div class="dsec" data-group="d${d}" data-tab="shop"><div class="shop-wrap">${shopListHTML(key,d)}</div></div>`;}
  return h;
}
function renderSunday(key,d){
  const m=MONTHS[key];
  const idx=Math.min(Math.floor((d-1)/7),SUN_MSGS.length-1);
  document.getElementById("sun-msg-area").innerHTML=`<div class="sun-msg"><span class="sun-msg-icon"><i class="ti ti-sun" aria-hidden="true"></i></span><span>${SUN_MSGS[idx]}</span></div>`;
  const hasSH=m._sh.has(d);let h="";
  if(hasSH){h+=`<div class="dtabs"><div class="dtab on" data-group="s${d}" data-tab="recipe" onclick="switchDTab('recipe','s${d}')">レシピ</div><div class="dtab" data-group="s${d}" data-tab="shop" onclick="switchDTab('shop','s${d}')">買い物リスト</div></div>`;}
  h+=`<div class="dsec on" data-group="s${d}" data-tab="recipe"><div class="sun-recipe-wrap"><p class="sun-recipe-note">料理する場合はメニューを選ぶとレシピを確認できます。</p><div class="sun-recipe-sel"><select id="sun-sel-${d}" onchange="onSunSel('${key}',${d})"><option value="">メニューを選択してください</option>`;
  m.SUN_MENUS.forEach(name=>{h+=`<option value="${name}">${name}</option>`;});
  h+=`</select><div id="sun-rc-${d}"></div></div></div></div>`;
  if(hasSH){h+=`<div class="dsec" data-group="s${d}" data-tab="shop"><div class="shop-wrap">${shopListHTML(key,d)}</div></div>`;}
  return h;
}
function renderHoliday(label){
  document.getElementById("sun-msg-area").innerHTML="";
  return`<div class="psec"><div class="pv" style="color:var(--text-2)">🎏 ${label}。今日はお休みです。</div></div>`;
}
function onSunSel(key,d){
  const m=MONTHS[key];
  const sel=document.getElementById(`sun-sel-${d}`);const rc=document.getElementById(`sun-rc-${d}`);
  if(!sel.value){rc.innerHTML="";return;}
  const name=sel.value;const r=m.RC[name];const q=encodeURIComponent(name);
  let h="";
  if(r){h+=`<div class="rc"><h4>作り方</h4><ul>`;r.steps.forEach(s=>{h+=`<li>${s}</li>`;});h+=`</ul><h4>ポイント</h4><p>${r.pt}</p></div>`;}
  h+=`<a class="rlink" href="https://cookpad.com/search/${q}" target="_blank" rel="noopener"><i class="ti ti-external-link" style="font-size:14px" aria-hidden="true"></i>クックパッドで見る</a>`;
  rc.innerHTML=h;
}
function openPanel(key,d){
  const m=MONTHS[key];const dow=new Date(m.year,m.month-1,d).getDay();
  const isSun=dow===0,isHol=!!m.holidays[d];
  document.getElementById("ptitle").textContent=`${m.month}月${d}日（${DOW[dow]}）`;
  document.getElementById("sun-msg-area").innerHTML="";
  document.getElementById("panel-body").innerHTML=isHol?renderHoliday(m.holidays[d]):isSun?renderSunday(key,d):renderDinner(key,d);
  document.querySelector(".sheet-body").scrollTop=0;
  openSheet();
  updateSheetMode();
}
/* シートの高さでフル/ハーフを判定し、フル時だけ .full（＝閉じるボタン表示） */
function updateSheetMode(){
  const sheet=document.getElementById("pn");
  requestAnimationFrame(()=>{
    const full=sheet.offsetHeight>=window.innerHeight*0.7;
    sheet.classList.toggle("full",full);
  });
}

/* ===== ボトムシート開閉 & ドラッグ ===== */
let _savedScroll=0;
function openSheet(){
  if(!document.body.classList.contains("sheet-open")){
    _savedScroll=window.scrollY;
    document.body.style.top=`-${_savedScroll}px`;
    document.body.classList.add("sheet-open"); // 背景スクロールをロック（シートを画面下部に固定）
  }
  document.getElementById("scrim").classList.add("on");
  document.getElementById("pn").classList.add("on");
}
function closeSheet(){
  document.getElementById("scrim").classList.remove("on");
  document.getElementById("pn").classList.remove("on");
  document.getElementById("pn").classList.remove("full");
  document.querySelectorAll(".cell").forEach(c=>c.classList.remove("sel"));
  if(document.body.classList.contains("sheet-open")){
    document.body.classList.remove("sheet-open");
    document.body.style.top="";
    window.scrollTo(0,_savedScroll);
  }
}
(function initSheetDrag(){
  const sheet=document.getElementById("pn");
  const grab=document.getElementById("grab");
  let startY=0,dy=0,dragging=false;
  const onDown=y=>{startY=y;dy=0;dragging=true;sheet.style.transition="none";};
  const onMove=y=>{if(!dragging)return;dy=y-startY;if(dy<0)dy=0;sheet.style.transform=`translateY(${dy}px)`;};
  const onUp=()=>{if(!dragging)return;dragging=false;sheet.style.transition="";sheet.style.transform="";
    if(dy>110)closeSheet();}; // 下方向に十分スワイプしたら最小化（閉じる）
  // 閉じるボタン（ドラッグ開始を抑止して確実にタップで閉じる）
  const closeBtn=document.getElementById("sheetClose");
  closeBtn.addEventListener("pointerdown",e=>e.stopPropagation());
  closeBtn.addEventListener("click",e=>{e.stopPropagation();closeSheet();});
  grab.addEventListener("touchstart",e=>onDown(e.touches[0].clientY),{passive:true});
  window.addEventListener("touchmove",e=>{if(dragging){onMove(e.touches[0].clientY);}},{passive:true});
  window.addEventListener("touchend",onUp);
  grab.addEventListener("pointerdown",e=>{if(e.pointerType!=="touch")onDown(e.clientY);});
  window.addEventListener("pointermove",e=>{if(dragging&&e.pointerType!=="touch")onMove(e.clientY);});
  window.addEventListener("pointerup",e=>{if(e.pointerType!=="touch")onUp();});
  // Escキーでも閉じる
  window.addEventListener("keydown",e=>{if(e.key==="Escape")closeSheet();});
})();

/* ===== 被りチェック（毎ロード時に自動実行・コンソールに警告） =====
   保育園の昼ご飯(n)と夕食メイン(m)が同カテゴリ（魚/鶏/豚/牛/カレー）なら警告。
   毎月データを差し替えたら DevTools コンソールで ⚠️ が出ていないか必ず確認すること。 */
function category(txt){
  if(!txt)return null;
  if(/カレー/.test(txt))return"カレー";
  if(/(魚|鮭|さけ|サケ|鯖|さば|サバ|ぶり|ブリ|かじき|カジキ|たら|タラ|さわら|サワラ|あじ|アジ|いわし|イワシ|まぐろ|マグロ|ツナ|ホイル焼き|ムニエル|塩焼き|照り焼き.*魚)/.test(txt))return"魚";
  if(/(鶏|チキン|から揚げ|唐揚げ|焼き鳥|親子)/.test(txt))return"鶏";
  if(/(豚|ポーク|生姜焼き|豚汁|回鍋肉|とんかつ|ジューシー)/.test(txt))return"豚";
  if(/(牛|ビーフ|牛丼|すき焼き)/.test(txt))return"牛";
  return null;
}
function checkClashes(){
  let n=0;
  Object.values(MONTHS).forEach(m=>{
    Object.keys(m.D).forEach(d=>{
      const info=m.D[d];const cd=category(info.m),cn=category(info.n);
      if(cd&&cn&&cd===cn){n++;console.warn(`⚠️ 被りの可能性: ${m.year}/${m.month}/${d} 夕食「${info.m}」× 保育園「${info.n}」(${cd})`);}
    });
  });
  if(n===0)console.info("✅ 被りチェック: 問題なし");
  else console.warn(`⚠️ 被りの可能性が ${n}件 あります。データを見直してください。`);
}

window.addEventListener("DOMContentLoaded",()=>{ENGINE.init();checkClashes();});
